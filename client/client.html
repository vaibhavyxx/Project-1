    <script>
        const clearBookDetails = () => {
            const bookList = document.querySelectorAll('.bookContent'); 
            bookList.forEach(bookItem => {
                if(bookItem) bookItem.remove();
            });
        }

        const renderContentTypes = (response, content, message) => {
            content.innerHTML = `<h2>Response status: ${response.status}, Content Length: ${response.headers.get('content-length')}</h2> `;
            statusResponse(response.status, message, content);
        }

        const showCount = (count) => {
            const footer = document.querySelector('footer');
            footer.innerText = `${count} results`;
        }

        const renderBookDetails = (content, book) =>{
            const bookContent = document.createElement('div');
            const bookDetails = document.createElement('div');
            bookContent.className = 'bookContent';
            bookDetails.className = 'bookDetailsTag';
            
            const titleLink = document.createElement('a');
            titleLink.href = book["link"];
            const linkText = document.createTextNode(book["title"]);
            bookDetails.innerHTML = `<ul><li>Author: ${book["author"]}</li>
                <li>Country: ${book["country"]}</li>
                <li>Pages: ${book["pages"]}</li>
                <li>Language: ${book["language"]}</li>
                <li>Year of Publication: ${book["year"]}</li>
                Genres:`;

            const genres = book["genres"];
            for(genre in genres){
                bookDetails.innerHTML += `${genres[genre]}, `;
            }
            bookDetails.innerHTML += '</ul>';

            titleLink.appendChild(linkText);
            bookContent.appendChild(titleLink);
            bookContent.appendChild(bookDetails);
            content.appendChild(bookContent);
        }

        //testing arrays
        const handleResponses = (response) => {
            response.text().then(resText => {
                const content = document.querySelector('#content');
                const responseContent = document.querySelector('#response');
                let data = null;
                let message = null;
                if(resText){
                    try{
                        data = JSON.parse(resText);
                        message = data.message || null;
                    }catch(e){}
                }
                clearBookDetails();
                let count = 0;
                if(response.status === 200){
                    if(Object.keys(data).length ===0){
                        responseContent.innerText += `, No book found`;
                        return;
                    }
                    count = Object.keys(data).length;

                    for(let i =0; i < count; i++){
                        renderBookDetails(content, data[i]); //tests
                    }
                }
                renderContentTypes(response, responseContent, message);
                showCount(count);
            });
        }

        /*const handleGetResponses = (response, type) => {
            response.text().then(resText => {
                const content = document.querySelector('#content');
                const responseContent = document.querySelector('#response');
                
                let data = null;
                let message = null;
                if(resText){
                    try{
                        data = JSON.parse(resText);
                        message = data.message || null;
                    }catch(e){}
                }
                renderContentTypes(response, responseContent, message);
               
                if(response.status === 200){
                    if(type === 'GET'){
                        for(book in data){
                            renderBookDetails(content, data[book]);
                        }
                        showCount(data.length);
                    }else if(type === 'HEAD'){
                        clearBookDetails();
                    }
                    showCount(Object.keys(data).length);
                }
            });
        }*/

        const statusResponse = (status, message, content) => {
            let phrase = "";
            switch(status){
                case 200: phrase="Success";
                    break;
                case 201: phrase="Created";
                    break;
                case 204: phrase="Updated";
                    break;
                case 400: phrase="Bad Request";
                    break;
                case 404: phrase = "Not Found"; 
                    break;
                default: phrase="Not implemented";
                    break;
            }
            content.innerText += `, ${phrase}`;
           if(message){
            content.innerText += ` ,${message}`;
           }
        };

        const sendFetchRequest = (url, acceptedType, type)=>{
            debugger;
            const options = {
                method:type,
                headers:{
                    'Accept':acceptedType,
                },
            };
            fetch(url, options)
                .then(data => {
                    //debugger;
                    //console.log(`data: ${data}`);
                    /*if(url.includes('/getData')){
                        handleGetResponses(data, type);
                    } else if(url.includes('/getLang')){
                        console.log('this is the end point of language');
                    } else if(url.includes('/getYear')){
                        console.log('this is the end point of year');
                    }
                    else*/ {
                        handleResponses(data)
                    }
                })
                .catch(err =>{
                    console.log('fetch error: '+ err);
                });
        }

        const sendPost = async (form, addData) => {
            const url = form.getAttribute('action');
            const method = form.getAttribute('method');
            const dataType = form.querySelector('#dataType').value;

            let data = {};
            let phrase = "";
            let genres = [];
            const title = form.querySelector("[name=title]").value;
            if(addData){
                const author = form.querySelector('[name=author]').value;
                const year = form.querySelector('[name=year]').value;
                const genre = form.querySelector('[name=genres]').value;
                const link = form.querySelector('[name=link]').value;
                genres.push(genre);
                data = {author, title, year, genres, link};
                phrase = `author=${author}&title=${title}&year=${year}&genres=${genres}&link=${link}`;
            }else{
                const pages = form.querySelector('[name=page]').value;
                const country = form.querySelector('[name=country]').value;
                const language = form.querySelector('[name=language]').value;
                data = {title, pages, country, language};
                phrase = `title=${title}&page=${pages}&country=${country}&language=${language}`;
            }

            if(dataType === 'application/json'){
                phrase = JSON.stringify(data);
            }
            const response = await fetch(url, {
                method:'POST',
                headers:{
                    'Content-Type': dataType,
                    'Content-Length': form.length,
                    'Accept': 'application/json',   //test if this can be accepted as url-encoded
                },
                body: phrase,
            });
            handleGetResponses(response, 'POST');
        }

    const getSpecificURL = (form, name, acceptedType, method, urlAttribute) => {
        let htmlTag = form.querySelector(`[name=${name}]`).value;
        let url = form.getAttribute('action');
        url += `?${urlAttribute}=${htmlTag}`;
        sendFetchRequest(url, acceptedType, method);
    };

    const init = () => {
        const addBookForm = document.querySelector('#addBookForm');
        const addDetailsForm = document.querySelector('#adminForm');
        const getAllForm = document.querySelector('#getAllForm');
        const clearButton = document.querySelector('#clear');
        const titleForm = document.querySelector('#filterTitleForm');
        const authorForm = document.querySelector('#filterAuthors');
        const countryForm = document.querySelector('#filterCountry');
       
        const fetchData = (e) => {
            e.preventDefault();
            const type = getAllForm.querySelector('[name=requestType]').value;
            console.log('type: '+ type);
            const url = getAllForm.getAttribute('action');
            sendFetchRequest(url, 'application/json', type);
            return false;
        }
        const addDetails = (e) => {
            e.preventDefault();
            sendPost(addDetailsForm, false);
            return false;
        }
        const addBookData = (e) => {
            e.preventDefault();
            sendPost(addBookForm, true);
            return false;
        }
        
        addBookForm.addEventListener('submit', addBookData);
        addDetailsForm.addEventListener('submit', addDetails);
        getAllForm.addEventListener('submit', fetchData);

        titleForm.addEventListener('submit', (e)=> {
            e.preventDefault();
            const type = titleForm.querySelector('[name=requestType]').value;
            console.log('type: ' + type);
            getSpecificURL(titleForm, 'title', 'application/json', type, 'title')
        });
        authorForm.addEventListener('submit', (e)=> {
            e.preventDefault();
            const type = authorForm.querySelector('[name=requestType]').value;
            getSpecificURL(authorForm, 'author', 'application/json', type, 'author');
        });
        countryForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const type = countryForm.querySelector('[name=requestType]').value;
            getSpecificURL(countryForm, 'country', 'application/json', type, 'country');
        });

        clearButton.addEventListener('click', ()=> {
            clearBookDetails();
            showCount(0);
        });
    };
    window.onload = init;
    </script>

        <input class="formBtn" type="submit" value="Enter">

    </div>
    
    <h2>POST Requests</h2>
    <div class="web-forms">

        <input id="authorField" type="text" name="author" placeholder="Enter author">

    <form id="adminForm" action="/addDetails" method="post">
         <h3>Add Administrative Details</h3>
